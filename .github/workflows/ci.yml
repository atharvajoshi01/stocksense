name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,spark]"
      - name: Lint
        run: ruff check pipeline tests
      - name: Tests
        run: pytest -ra
      - name: Smoke run of full pipeline
        run: |
          python -m stocksense.run --out web/public/data
        env:
          PYTHONPATH: pipeline

  web:
    name: Web build
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install python (for pipeline data)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Regenerate pipeline artifacts
        run: python -m stocksense.run --out web/public/data
        env:
          PYTHONPATH: pipeline
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Build web
        working-directory: web
        run: npm run build
